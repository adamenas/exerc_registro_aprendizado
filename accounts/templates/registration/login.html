{% extends 'learning_logs/base.html' %}
{% block content %}

    {% if form.errors %}
        <p>Seu nome de usuário ou senha estão incorretos. Tente novamente.</p>
    {% endif %}

    <form action="{% url 'accounts:login' %}" method="post">
        {% csrf_token %}
        {{ form.as_div }}

        <button name="submit">Entrar</button>
    </form>

    {% endblock content %}
